<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#7C3AED">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RyedzAI-Agent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>RyedzAI-Agent | AI Tutor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #F8F9FC;
            --bg-surface: #FFFFFF;
            --bg-elevated: #FFFFFF;
            --sidebar-bg: rgba(255,255,255,0.98);
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --text-tertiary: #9CA3AF;
            --border-light: #E5E7EB;
            --bubble-user: linear-gradient(135deg, #7C3AED 0%, #A855F7 100%);
            --bubble-ai: #F3F4F6;
            --bubble-ai-text: #1F2937;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --status-online: #10B981;
            --ripple: rgba(124,58,237,0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #0F172A;
            --bg-surface: #1E293B;
            --bg-elevated: #334155;
            --sidebar-bg: rgba(30,41,59,0.98);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-tertiary: #64748B;
            --border-light: #334155;
            --bubble-user: linear-gradient(135deg, #8B5CF6 0%, #C084FC 100%);
            --bubble-ai: #334155;
            --bubble-ai-text: #E2E8F0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            border-radius: 0 28px 28px 0;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 60px 20px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-header h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 16px;
        }

        .new-chat-btn:active {
            transform: scale(0.97);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .chat-item:active {
            background: var(--ripple);
        }

        .chat-item.active {
            background: var(--ripple);
        }

        .chat-item-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #7C3AED20, #A855F720);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-item-icon i {
            color: #7C3AED;
            font-size: 18px;
        }

        .chat-item-info {
            flex: 1;
        }

        .chat-item-title {
            font-weight: 500;
            font-size: 14px;
        }

        .chat-item-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chat-item-date {
            font-size: 10px;
            color: var(--text-tertiary);
        }

        .delete-chat {
            background: none;
            border: none;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-tertiary);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: var(--bg-primary);
        }

        .topbar {
            background: var(--bg-surface);
            padding: 12px 16px;
            padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border-radius: 28px;
            background: var(--bg-elevated);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .menu-btn:active {
            transform: scale(0.92);
        }

        .ai-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ai-avatar i {
            font-size: 22px;
            color: white;
        }

        .ai-info {
            flex: 1;
        }

        .ai-name {
            font-weight: 600;
            font-size: 16px;
        }

        .ai-status {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ai-status.online {
            color: var(--status-online);
        }

        .theme-toggle, .admin-toggle {
            width: 40px;
            height: 40px;
            border-radius: 28px;
            background: var(--bg-elevated);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.45;
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: var(--bubble-user);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.ai .bubble {
            background: var(--bubble-ai);
            color: var(--bubble-ai-text);
            border-bottom-left-radius: 6px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 4px;
            padding: 0 8px;
        }

        .message.user .message-time {
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            background: var(--bubble-ai);
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .input-area {
            background: var(--bg-surface);
            padding: 12px 16px;
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
            border-top: 1px solid var(--border-light);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-elevated);
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--text-tertiary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 28px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        .send-btn i {
            color: white;
            font-size: 18px;
        }

        .send-btn:disabled {
            opacity: 0.5;
            transform: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .admin-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 85%;
            max-width: 360px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 28px 0 0 28px;
            display: flex;
            flex-direction: column;
        }

        .admin-panel.open {
            transform: translateX(0);
        }

        .admin-header {
            padding: 60px 20px 20px;
            border-bottom: 1px solid var(--border-light);
            position: relative;
        }

        .close-admin {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .admin-stats {
            display: flex;
            gap: 12px;
            padding: 20px;
        }

        .stat-card {
            flex: 1;
            background: var(--bg-elevated);
            padding: 16px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-card i {
            font-size: 24px;
            color: #7C3AED;
            margin-bottom: 8px;
        }

        .api-status {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 12px;
            background: var(--bg-elevated);
            margin-left: 8px;
        }

        .hidden {
            display: none !important;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-robot"></i> RyedzAI</h2>
            <button class="new-chat-btn" id="newChatBtn">
                <i class="fas fa-plus"></i> Percakapan Baru
            </button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="chat-main">
        <div class="topbar">
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="ai-avatar"><i class="fas fa-robot"></i></div>
            <div class="ai-info">
                <div class="ai-name">RyedzAI-Agent</div>
                <div class="ai-status online" id="aiStatus"><i class="fas fa-circle"></i> Online</div>
            </div>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="admin-toggle" id="adminToggle"><i class="fas fa-chart-line"></i></button>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">
                <i class="fas fa-comment-dots"></i>
                <p>Mulai percakapan dengan RyedzAI</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Ketik pesan..." autocomplete="off">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h3><i class="fas fa-chart-line"></i> Dashboard Admin</h3>
            <button class="close-admin" id="closeAdminBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="admin-stats" id="adminStats">
            <div class="stat-card"><i class="fas fa-users"></i><div id="totalUsers">1</div><small>Users</small></div>
            <div class="stat-card"><i class="fas fa-comments"></i><div id="totalChats">0</div><small>Chats</small></div>
            <div class="stat-card"><i class="fas fa-exchange-alt"></i><div id="totalMessages">0</div><small>Messages</small></div>
        </div>
        <div class="chat-list" id="adminUsersList"></div>
        <div class="admin-header" style="margin-top: 20px;">
            <h4><i class="fas fa-key"></i> API Status</h4>
            <div id="apiStatusList" style="padding: 12px;"></div>
        </div>
    </div>
</div>

<script>
    // ==================== GROQ API KEY (GRATIS) ====================
    const GROQ_API_KEY = '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';
    
    let isSending = false;
    
    // ==================== CONFIG ====================
    const STORAGE_KEY = 'ryedzai_chats';
    
    let currentChatId = null;
    let chats = [];
    let darkMode = localStorage.getItem('darkMode') === 'true';
    
    // DOM Elements
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuBtn = document.getElementById('menuBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const chatList = document.getElementById('chatList');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const themeToggle = document.getElementById('themeToggle');
    const adminToggle = document.getElementById('adminToggle');
    const adminPanel = document.getElementById('adminPanel');
    const closeAdminBtn = document.getElementById('closeAdminBtn');
    const aiStatus = document.getElementById('aiStatus');
    
    // Utilities
    function applyTheme() {
        if (darkMode) {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.documentElement.removeAttribute('data-theme');
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        }
        localStorage.setItem('darkMode', darkMode);
    }
    
    function formatTime() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }
    
    function formatDate(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        if (diff < 86400000) return 'Hari ini';
        if (diff < 604800000) return `${Math.floor(diff / 86400000)} hari lalu`;
        return date.toLocaleDateString('id-ID');
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
    }
    
    function setAIStatus(status, isTyping = false) {
        if (isTyping) {
            aiStatus.innerHTML = '<i class="fas fa-pen-fancy"></i> Mengetik...';
            aiStatus.className = 'ai-status';
        } else {
            aiStatus.innerHTML = `<i class="fas fa-circle"></i> ${status}`;
            aiStatus.className = 'ai-status online';
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Chat Functions
    function saveChats() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
        renderChatList();
        updateAdminStats();
    }
    
    function loadChats() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            chats = JSON.parse(stored);
        } else {
            chats = [];
        }
        renderChatList();
        if (chats.length > 0 && !currentChatId) {
            currentChatId = chats[0].id;
            loadChat(currentChatId);
        } else if (chats.length === 0) {
            createNewChat();
        }
        updateAdminStats();
    }
    
    function createNewChat() {
        const newChat = {
            id: Date.now().toString(),
            title: 'Percakapan Baru',
            messages: [],
            createdAt: Date.now(),
            updatedAt: Date.now()
        };
        chats.unshift(newChat);
        saveChats();
        currentChatId = newChat.id;
        loadChat(currentChatId);
        closeSidebar();
    }
    
    function loadChat(chatId) {
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        
        currentChatId = chatId;
        messagesContainer.innerHTML = '';
        
        if (chat.messages.length === 0) {
            const welcomeMsg = {
                role: 'assistant',
                content: 'Selamat datang di **RyedzAI-Agent**! 👋\n\nSaya adalah AI tutor profesional siap membantu Anda belajar. Apa yang ingin Anda pelajari hari ini?',
                timestamp: Date.now()
            };
            chat.messages.push(welcomeMsg);
            saveChats();
        }
        
        chat.messages.forEach(msg => {
            renderMessage(msg.role, msg.content, msg.timestamp);
        });
        
        scrollToBottom();
        renderChatList();
    }
    
    function renderMessage(role, content, timestamp) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'assistant' ? 'ai' : 'user'}`;
        
        const formattedContent = content
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
        
        messageDiv.innerHTML = `
            <div class="bubble">${formattedContent}</div>
            <div class="message-time">${formatTime()}</div>
        `;
        
        messagesContainer.appendChild(messageDiv);
    }
    
    function addMessage(role, content) {
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        
        const newMessage = {
            role: role,
            content: content,
            timestamp: Date.now()
        };
        
        chat.messages.push(newMessage);
        chat.updatedAt = Date.now();
        
        if (role === 'user' && chat.messages.filter(m => m.role === 'user').length === 1) {
            chat.title = content.length > 25 ? content.substring(0, 25) + '...' : content;
        }
        
        saveChats();
        renderMessage(role, content, newMessage.timestamp);
        scrollToBottom();
    }
    
    function deleteChat(chatId, event) {
        event.stopPropagation();
        if (confirm('Hapus percakapan ini?')) {
            const index = chats.findIndex(c => c.id === chatId);
            if (index !== -1) {
                chats.splice(index, 1);
                saveChats();
                
                if (currentChatId === chatId) {
                    if (chats.length > 0) {
                        currentChatId = chats[0].id;
                        loadChat(currentChatId);
                    } else {
                        createNewChat();
                    }
                }
            }
        }
    }
    
    function renderChatList() {
        if (chats.length === 0) {
            chatList.innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i><p>Belum ada percakapan</p></div>';
            return;
        }
        
        chatList.innerHTML = chats.map(chat => `
            <div class="chat-item ${currentChatId === chat.id ? 'active' : ''}" data-id="${chat.id}">
                <div class="chat-item-icon"><i class="fas fa-comment"></i></div>
                <div class="chat-item-info">
                    <div class="chat-item-title">${escapeHtml(chat.title)}</div>
                    <div class="chat-item-preview">${escapeHtml(chat.messages[chat.messages.length - 1]?.content.substring(0, 40) || 'Percakapan baru')}</div>
                </div>
                <div class="chat-item-date">${formatDate(chat.updatedAt)}</div>
                <button class="delete-chat" data-id="${chat.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
        `).join('');
        
        document.querySelectorAll('.chat-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (!e.target.closest('.delete-chat')) {
                    currentChatId = item.dataset.id;
                    loadChat(currentChatId);
                    closeSidebar();
                }
            });
            
            const deleteBtn = item.querySelector('.delete-chat');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', (e) => deleteChat(item.dataset.id, e));
            }
        });
    }
    
    // ==================== GROQ API CALL (GRATIS & CEPAT) ====================
    async function callGroqAPI(userMessage) {
        console.log('Memanggil Groq API dengan model llama-3.3-70b...');
        
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${GROQ_API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: [
                    {
                        role: 'system',
                        content: 'Kamu adalah RyedzAI-Agent, AI tutor pendidikan yang profesional, sabar, dan membantu. Gunakan bahasa Indonesia yang baik dan ramah. Berikan penjelasan yang mendetail dan edukatif. Gunakan **bold** untuk penekanan. Jangan memberikan jawaban singkat, berikan penjelasan yang bermanfaat.'
                    },
                    {
                        role: 'user',
                        content: userMessage
                    }
                ],
                temperature: 0.7,
                max_tokens: 2048
            })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            console.error('Groq API Error:', data);
            throw new Error(data.error?.message || 'Gagal mendapatkan respons dari AI');
        }
        
        return data.choices[0].message.content;
    }
    
    function updateApiStatusDisplay() {
        const apiStatusList = document.getElementById('apiStatusList');
        if (!apiStatusList) return;
        
        apiStatusList.innerHTML = `
            <div style="padding: 8px; margin: 4px 0; border-radius: 12px; background: var(--bg-elevated);">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-bolt" style="color: #10B981"></i>
                    <span style="font-size: 12px; font-weight: 500;">Groq API (Llama 3.3)</span>
                    <span style="font-size: 10px; padding: 2px 8px; border-radius: 20px; background: #10B98120; color: #10B981">● AKTIF</span>
                </div>
                <div style="font-size: 10px; color: var(--text-tertiary); margin-top: 4px;">Model: llama-3.3-70b-versatile</div>
                <div style="font-size: 10px; color: var(--text-tertiary);">Status: ✅ Gratis & Cepat</div>
            </div>
        `;
    }
    
    // ==================== SEND MESSAGE ====================
    async function sendToAI(userMessage) {
        if (isSending) return;
        isSending = true;
        
        addMessage('user', userMessage);
        messageInput.value = '';
        
        setAIStatus('Online', true);
        
        // Typing indicator
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        messagesContainer.appendChild(typingDiv);
        scrollToBottom();
        
        try {
            const aiResponse = await callGroqAPI(userMessage);
            
            // Hapus typing indicator
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) typingIndicator.remove();
            
            addMessage('assistant', aiResponse);
            setAIStatus('Online', false);
            
        } catch (error) {
            console.error('Error:', error);
            
            // Hapus typing indicator
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) typingIndicator.remove();
            
            // Fallback response yang lebih ramah
            const fallbackMsg = `Maaf, sepertinya ada gangguan teknis. ${error.message}\n\nSilakan coba lagi dalam beberapa saat. Jika masih bermasalah, coba mulai percakapan baru.`;
            addMessage('assistant', fallbackMsg);
            setAIStatus('Online', false);
        } finally {
            isSending = false;
        }
    }
    
    // Admin Functions
    function updateAdminStats() {
        document.getElementById('totalChats').innerText = chats.length;
        const totalMessages = chats.reduce((sum, chat) => sum + chat.messages.length, 0);
        document.getElementById('totalMessages').innerText = totalMessages;
        
        const adminUsersList = document.getElementById('adminUsersList');
        adminUsersList.innerHTML = `
            <div class="chat-item" style="margin-top: 12px;">
                <div class="chat-item-icon"><i class="fas fa-user-circle"></i></div>
                <div class="chat-item-info">
                    <div class="chat-item-title">Pengguna Aktif</div>
                    <div class="chat-item-preview">${chats.length} percakapan • ${totalMessages} pesan</div>
                </div>
            </div>
        `;
        
        updateApiStatusDisplay();
    }
    
    // UI Functions
    function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('active'); }
    function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active'); }
    function openAdminPanel() { adminPanel.classList.add('open'); updateAdminStats(); }
    function closeAdminPanel() { adminPanel.classList.remove('open'); }
    
    // Event Listeners
    menuBtn.addEventListener('click', openSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);
    newChatBtn.addEventListener('click', createNewChat);
    sendBtn.addEventListener('click', () => { const msg = messageInput.value.trim(); if (msg && !isSending) sendToAI(msg); });
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const msg = messageInput.value.trim(); if (msg && !isSending) sendToAI(msg); } });
    themeToggle.addEventListener('click', () => { darkMode = !darkMode; applyTheme(); });
    adminToggle.addEventListener('click', openAdminPanel);
    closeAdminBtn.addEventListener('click', closeAdminPanel);
    
    // Initialize
    applyTheme();
    loadChats();
    updateApiStatusDisplay();
    
    console.log('🚀 RyedzAI-Agent siap! Menggunakan Groq API (gratis) dengan model Llama 3.3');
</script>
</body>
