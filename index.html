<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#7C3AED">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RyedzAI-Agent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>RyedzAI-Agent | AI Tutor Lengkap</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #F8F9FC;
            --bg-surface: #FFFFFF;
            --bg-elevated: #FFFFFF;
            --sidebar-bg: rgba(255,255,255,0.98);
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --text-tertiary: #9CA3AF;
            --border-light: #E5E7EB;
            --bubble-user: linear-gradient(135deg, #7C3AED 0%, #A855F7 100%);
            --bubble-ai: #F3F4F6;
            --bubble-ai-text: #1F2937;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --status-online: #10B981;
            --ripple: rgba(124,58,237,0.1);
            --toast-success: #10B981;
            --toast-error: #EF4444;
        }

        [data-theme="dark"] {
            --bg-primary: #0F172A;
            --bg-surface: #1E293B;
            --bg-elevated: #334155;
            --sidebar-bg: rgba(30,41,59,0.98);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-tertiary: #64748B;
            --border-light: #334155;
            --bubble-user: linear-gradient(135deg, #8B5CF6 0%, #C084FC 100%);
            --bubble-ai: #334155;
            --bubble-ai-text: #E2E8F0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            border-radius: 0 28px 28px 0;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 60px 20px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-header h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn, .export-all-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        .export-all-btn {
            background: linear-gradient(135deg, #10B981, #059669);
        }

        .new-chat-btn:active, .export-all-btn:active {
            transform: scale(0.97);
        }

        /* Search Bar */
        .search-bar {
            padding: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .search-bar input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-light);
            border-radius: 24px;
            background: var(--bg-elevated);
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .chat-item:active {
            background: var(--ripple);
        }

        .chat-item.active {
            background: var(--ripple);
        }

        .chat-item-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #7C3AED20, #A855F720);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-item-info {
            flex: 1;
        }

        .chat-item-title {
            font-weight: 500;
            font-size: 14px;
        }

        .chat-item-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chat-item-date {
            font-size: 10px;
            color: var(--text-tertiary);
        }

        .delete-chat {
            background: none;
            border: none;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-tertiary);
        }

        /* Main Chat */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: var(--bg-primary);
        }

        .topbar {
            background: var(--bg-surface);
            padding: 12px 16px;
            padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
        }

        .menu-btn, .theme-toggle, .admin-toggle, .speaker-toggle, .voice-toggle {
            width: 40px;
            height: 40px;
            border-radius: 28px;
            background: var(--bg-elevated);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .menu-btn:active, .theme-toggle:active, .admin-toggle:active,
        .speaker-toggle:active, .voice-toggle:active {
            transform: scale(0.92);
        }

        .speaker-toggle.active, .voice-toggle.active {
            background: #7C3AED;
            color: white;
        }

        .ai-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ai-info {
            flex: 1;
        }

        .ai-name {
            font-weight: 600;
            font-size: 16px;
        }

        .ai-status {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ai-status.online {
            color: var(--status-online);
        }

        /* Upload Area */
        .upload-area {
            padding: 8px 16px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .upload-btn {
            padding: 8px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }

        .file-name {
            font-size: 12px;
            color: var(--text-secondary);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.45;
            word-wrap: break-word;
            position: relative;
        }

        .message.user .bubble {
            background: var(--bubble-user);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.ai .bubble {
            background: var(--bubble-ai);
            color: var(--bubble-ai-text);
            border-bottom-left-radius: 6px;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .message-actions button {
            background: none;
            border: none;
            font-size: 12px;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 16px;
        }

        .message-actions button:hover {
            background: var(--ripple);
        }

        .message-time {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 4px;
            padding: 0 8px;
        }

        .message.user .message-time {
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            background: var(--bubble-ai);
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .input-area {
            background: var(--bg-surface);
            padding: 12px 16px;
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
            border-top: 1px solid var(--border-light);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-elevated);
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 28px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        .regenerate-btn {
            background: none;
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 8px 16px;
            margin-top: 8px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Quiz Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .modal.open {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: var(--bg-surface);
            border-radius: 28px;
            padding: 24px;
            max-width: 90%;
            width: 400px;
            max-height: 80%;
            overflow-y: auto;
        }

        .quiz-question {
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg-elevated);
            border-radius: 16px;
        }

        .quiz-option {
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            background: var(--bg-primary);
        }

        .quiz-option.selected {
            background: #7C3AED20;
            border-left: 3px solid #7C3AED;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-surface);
            padding: 12px 20px;
            border-radius: 40px;
            box-shadow: var(--shadow-md);
            z-index: 400;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-left: 4px solid var(--toast-success); }
        .toast.error { border-left: 4px solid var(--toast-error); }

        .admin-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 85%;
            max-width: 360px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s;
            border-radius: 28px 0 0 28px;
            display: flex;
            flex-direction: column;
        }

        .admin-panel.open {
            transform: translateX(0);
        }

        .admin-header {
            padding: 60px 20px 20px;
            border-bottom: 1px solid var(--border-light);
            position: relative;
        }

        .close-admin {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .admin-stats {
            display: flex;
            gap: 12px;
            padding: 20px;
        }

        .stat-card {
            flex: 1;
            background: var(--bg-elevated);
            padding: 16px;
            border-radius: 20px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-robot"></i> RyedzAI</h2>
            <button class="new-chat-btn" id="newChatBtn">
                <i class="fas fa-plus"></i> Percakapan Baru
            </button>
            <button class="export-all-btn" id="exportAllChatsBtn">
                <i class="fas fa-download"></i> Export Semua Chat
            </button>
        </div>
        
        <!-- Fitur 8: Search Chat History -->
        <div class="search-bar">
            <input type="text" id="searchChat" placeholder="🔍 Cari percakapan...">
        </div>
        
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="chat-main">
        <div class="topbar">
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="ai-avatar"><i class="fas fa-robot"></i></div>
            <div class="ai-info">
                <div class="ai-name">RyedzAI-Agent</div>
                <div class="ai-status online" id="aiStatus"><i class="fas fa-circle"></i> Online</div>
            </div>
            <!-- Fitur 2: Text-to-Speech Toggle -->
            <button class="speaker-toggle" id="speakerToggle" title="Bacakan jawaban">
                <i class="fas fa-volume-up"></i>
            </button>
            <!-- Fitur 3: Voice Input -->
            <button class="voice-toggle" id="voiceToggle" title="Input suara">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="admin-toggle" id="adminToggle"><i class="fas fa-chart-line"></i></button>
        </div>
        
        <!-- Fitur 1: Upload File (RAG) -->
        <div class="upload-area">
            <button class="upload-btn" id="uploadBtn">
                <i class="fas fa-upload"></i> Upload Materi
            </button>
            <input type="file" id="fileInput" accept=".pdf,.txt,.md" style="display: none;">
            <span class="file-name" id="fileName">Belum ada file diupload</span>
            <button class="upload-btn" id="quizBtn" style="background: #7C3AED20;">
                <i class="fas fa-question-circle"></i> Quiz
            </button>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-comment-dots"></i>
                <p>Mulai percakapan dengan RyedzAI</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Ketik pesan..." autocomplete="off">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div class="modal" id="quizModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 16px;"><i class="fas fa-question-circle"></i> Quiz Generator</h3>
            <input type="text" id="quizTopic" placeholder="Masukkan topik quiz..." style="width: 100%; padding: 12px; border-radius: 16px; border: 1px solid var(--border-light); background: var(--bg-elevated); margin-bottom: 12px;">
            <select id="quizLevel" style="width: 100%; padding: 12px; border-radius: 16px; border: 1px solid var(--border-light); background: var(--bg-elevated); margin-bottom: 16px;">
                <option value="mudah">Mudah</option>
                <option value="sedang">Sedang</option>
                <option value="sulit">Sulit</option>
            </select>
            <button id="generateQuizBtn" style="width: 100%; padding: 12px; background: #7C3AED; color: white; border: none; border-radius: 28px;">Generate Quiz</button>
            <div id="quizContainer" style="margin-top: 20px;"></div>
            <button id="closeQuizBtn" style="margin-top: 16px; width: 100%; padding: 10px; background: none; border: 1px solid var(--border-light); border-radius: 28px;">Tutup</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h3><i class="fas fa-chart-line"></i> Dashboard Admin</h3>
            <button class="close-admin" id="closeAdminBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="admin-stats" id="adminStats">
            <div class="stat-card"><i class="fas fa-users"></i><div id="totalUsers">1</div><small>Users</small></div>
            <div class="stat-card"><i class="fas fa-comments"></i><div id="totalChats">0</div><small>Chats</small></div>
            <div class="stat-card"><i class="fas fa-exchange-alt"></i><div id="totalMessages">0</div><small>Messages</small></div>
        </div>
        <div class="admin-header">
            <h4><i class="fas fa-key"></i> API Status</h4>
            <div id="apiStatusList" style="padding: 12px;"></div>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage"></span>
</div>

<script>
    // ==================== GROQ API KEY ====================
    const GROQ_API_KEY = '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';
    
    let isSending = false;

    // ==================== CONFIG ====================
    const STORAGE_KEY = 'ryedzai_chats';
    
    let currentChatId = null;
    let chats = [];
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let searchQuery = '';
    
    // DOM Elements
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuBtn = document.getElementById('menuBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const chatList = document.getElementById('chatList');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const themeToggle = document.getElementById('themeToggle');
    const adminToggle = document.getElementById('adminToggle');
    const adminPanel = document.getElementById('adminPanel');
    const closeAdminBtn = document.getElementById('closeAdminBtn');
    const aiStatus = document.getElementById('aiStatus');
    const speakerToggle = document.getElementById('speakerToggle');
    const voiceToggle = document.getElementById('voiceToggle');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const quizBtn = document.getElementById('quizBtn');
    const quizModal = document.getElementById('quizModal');
    const closeQuizBtn = document.getElementById('closeQuizBtn');
    const generateQuizBtn = document.getElementById('generateQuizBtn');
    const quizTopic = document.getElementById('quizTopic');

    const searchChat = document.getElementById('searchChat');
    const exportAllChatsBtn = document.getElementById('exportAllChatsBtn');
    const emptyState = document.getElementById('emptyState');
    
    // Toast
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        toastMessage.textContent = message;
        toast.className = `toast ${type} show`;
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
    
    // Fitur 2: Text-to-Speech
    function speakText(text) {
        if (!isSpeakerEnabled) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID';
        utterance.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }
    
    speakerToggle.addEventListener('click', () => {
        isSpeakerEnabled = !isSpeakerEnabled;
        speakerToggle.classList.toggle('active', isSpeakerEnabled);
        showToast(isSpeakerEnabled ? 'Mode suara ON' : 'Mode suara OFF');
    });
    
    // Fitur 3: Voice Input
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'id-ID';
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            messageInput.value = text;
            showToast(`Dengar: "${text.substring(0, 30)}..."`);
            voiceToggle.classList.remove('active');
            isListening = false;
        };
        
        recognition.onerror = () => {
            voiceToggle.classList.remove('active');
            isListening = false;
            showToast('Gagal mendengar, coba lagi', 'error');
        };
    }
    
    voiceToggle.addEventListener('click', () => {
        if (!recognition) {
            showToast('Voice input tidak didukung browser ini', 'error');
            return;
        }
        if (isListening) {
            recognition.stop();
            voiceToggle.classList.remove('active');
            isListening = false;
        } else {
            recognition.start();
            voiceToggle.classList.add('active');
            isListening = true;
            showToast('Dengarkan...');
        }
    });
    
    // Fitur 1: Upload File (RAG)
    uploadBtn.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        fileName.textContent = file.name;
        
        const reader = new FileReader();
        reader.onload = async (event) => {
            uploadedFileContent = event.target.result;
            showToast(`File "${file.name}" berhasil diupload! AI bisa membaca materinya.`);
            
            // Kirim ke AI sebagai konteks
            addMessage('assistant', `📄 File **${file.name}** telah saya baca. Silakan tanyakan tentang materi di dalam file tersebut!`);
        };
        
        if (file.type === 'text/plain' || file.name.endsWith('.txt') || file.name.endsWith('.md')) {
            reader.readAsText(file);
        } else {
            showToast('Untuk PDF, ekstrak teksnya manual dulu ya', 'error');
            uploadedFileContent = `[File: ${file.name}] - Ekstraksi teks otomatis belum tersedia untuk PDF.`;
            reader.readAsText(file);
        }
    });
    
    // Fitur 5: Quiz Generator
    quizBtn.addEventListener('click', () => {
        quizModal.classList.add('open');
    });
    
    closeQuizBtn.addEventListener('click', () => {
        quizModal.classList.remove('open');
    });
    
    generateQuizBtn.addEventListener('click', async () => {
        const topic = quizTopic.value.trim();
        const level = quizLevel.value;
        
        if (!topic) {
            showToast('Masukkan topik quiz!', 'error');
            return;
        }
        
        quizContainer.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        
        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: [
                        {
                            role: 'system',
                            content: `Buatkan 5 soal pilihan ganda tentang "${topic}" dengan tingkat kesulitan ${level}. Format: JSON array dengan object: {question: "soal", options: ["A. ...", "B. ...", "C. ...", "D. ..."], answer: "A"}`
                        }
                    ],
                    temperature: 0.7
                })
            });
            
            const data = await response.json();
            let quizText = data.choices[0].message.content;
            
            // Parse JSON dari response
            const jsonMatch = quizText.match(/\[[\s\S]*\]/);
            if (jsonMatch) {
                const questions = JSON.parse(jsonMatch[0]);
                displayQuiz(questions);
            } else {
                quizContainer.innerHTML = `<div class="bubble">${quizText.replace(/\n/g, '<br>')}</div>`;
            }
        } catch (error) {
            quizContainer.innerHTML = '<div class="bubble">Gagal membuat quiz. Coba lagi.</div>';
        }
    });
    
    function displayQuiz(questions) {
        quizContainer.innerHTML = '';
        questions.forEach((q, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'quiz-question';
            qDiv.innerHTML = `
                <strong>${idx + 1}. ${q.question}</strong>
                <div style="margin-top: 8px;">
                    ${q.options.map(opt => `<div class="quiz-option" data-q="${idx}" data-answer="${opt.charAt(0)}">${opt}</div>`).join('')}
                </div>
                <div class="quiz-feedback" style="font-size: 12px; margin-top: 8px;"></div>
            `;
            quizContainer.appendChild(qDiv);
        });
        
        document.querySelectorAll('.quiz-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                const parent = opt.closest('.quiz-question');
                const feedback = parent.querySelector('.quiz-feedback');
                const selected = opt.dataset.answer;
                const correct = questions[opt.dataset.q].answer;
                
                if (selected === correct) {
                    feedback.innerHTML = '✅ Benar!';
                    feedback.style.color = '#10B981';
                    opt.style.background = '#10B98120';
                } else {
                    feedback.innerHTML = `❌ Salah. Jawaban benar: ${correct}`;
                    feedback.style.color = '#EF4444';
                    opt.style.background = '#EF444420';
                }
            });
        });
    }
    
    // Fitur 7: Regenerate Response
    async function regenerateResponse() {
        if (!lastUserMessage || isSending) return;
        
        // Hapus pesan AI terakhir
        const chat = chats.find(c => c.id === currentChatId);
        if (chat && chat.messages[chat.messages.length - 1].role === 'assistant') {
            chat.messages.pop();
            saveChats();
            loadChat(currentChatId);
        }
        
        await sendToAI(lastUserMessage, true);
    }
    
    // Fitur 6: Copy Message
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        showToast('Pesan disalin!');
    }
    
    // Fitur 4: Export Chat ke PDF
    function exportChatToPDF() {
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat || chat.messages.length === 0) {
            showToast('Tidak ada percakapan untuk diexport', 'error');
            return;
        }
        
        const exportHtml = `
            <html>
            <head><title>RyedzAI - ${chat.title}</title>
            <style>body{font-family:Arial;padding:20px} .message{margin:10px 0} .user{color:blue} .ai{color:green}</style>
            </head>
            <body>
            <h1>RyedzAI-Agent</h1>
            <h2>${chat.title}</h2>
            <p>Tanggal: ${new Date().toLocaleString()}</p>
            <hr>
            ${chat.messages.map(m => `<div class="message ${m.role}"><strong>${m.role === 'user' ? 'Anda' : 'RyedzAI'}:</strong><br>${m.content.replace(/\n/g, '<br>')}</div>`).join('')}
            </body>
            </html>
        `;
        
        const blob = new Blob([exportHtml], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `RyedzAI_${chat.title}_${Date.now()}.pdf`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Chat berhasil diexport!');
    }
    
    exportAllChatsBtn.addEventListener('click', () => {
        const allChatsHtml = `
            <html>
            <head><title>RyedzAI - Semua Percakapan</title></head>
            <body>
            <h1>RyedzAI-Agent - Semua Percakapan</h1>
            <p>Tanggal export: ${new Date().toLocaleString()}</p>
            ${chats.map(chat => `
                <hr>
                <h2>${chat.title}</h2>
                <p>${new Date(chat.createdAt).toLocaleString()}</p>
                ${chat.messages.map(m => `<p><strong>${m.role === 'user' ? 'Anda' : 'RyedzAI'}:</strong> ${m.content}</p>`).join('')}
            `).join('')}
            </body>
            </html>
        `;
        const blob = new Blob([allChatsHtml], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `RyedzAI_All_Chats_${Date.now()}.pdf`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Semua chat diexport!');
    });
    
    // Fitur 9: Peringatan Belajar (Notification)
    if ('Notification' in window && Notification.permission !== 'denied') {
        Notification.requestPermission();
    }
    
    function showStudyReminder() {
        if (Notification.permission === 'granted') {
            new Notification('RyedzAI-Agent', {
                body: 'Waktunya belajar! Ada yang ingin ditanyakan? 📚',
                icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%237C3AED"/%3E%3Ctext x="50" y="67" text-anchor="middle" fill="white" font-size="50"%3ER%3C/text%3E%3C/svg%3E'
            });
        }
    }
    
    // Set reminder setiap 2 jam
    setInterval(showStudyReminder, 2 * 60 * 60 * 1000);
    
    // Fitur 8: Search Chat History
    searchChat.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderChatList();
    });
    
    // Utilities
    function applyTheme() {
        if (darkMode) {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.documentElement.removeAttribute('data-theme');
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        }
        localStorage.setItem('darkMode', darkMode);
    }
    
    function formatTime() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }
    
    function formatDate(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        if (diff < 86400000) return 'Hari ini';
        if (diff < 604800000) return `${Math.floor(diff / 86400000)} hari lalu`;
        return date.toLocaleDateString('id-ID');
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
    }
    
    function setAIStatus(status, isTyping = false) {
        if (isTyping) {
            aiStatus.innerHTML = '<i class="fas fa-pen-fancy"></i> Mengetik...';
            aiStatus.className = 'ai-status';
        } else {
            aiStatus.innerHTML = `<i class="fas fa-circle"></i> ${status}`;
            aiStatus.className = 'ai-status online';
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Chat Functions
    function saveChats() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
        renderChatList();
        updateAdminStats();
        if (chats.length === 0) emptyState.classList.remove('hidden');
        else emptyState.classList.add('hidden');
    }
    
    function loadChats() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            chats = JSON.parse(stored);
        } else {
            chats = [];
        }
        renderChatList();
        if (chats.length > 0 && !currentChatId) {
            currentChatId = chats[0].id;
            loadChat(currentChatId);
        } else if (chats.length === 0) {
            createNewChat();
        }
        updateAdminStats();
    }
    
    function createNewChat() {
        const newChat = {
            id: Date.now().toString(),
            title: 'Percakapan Baru',
            messages: [],
            createdAt: Date.now(),
            updatedAt: Date.now()
        };
        chats.unshift(newChat);
        saveChats();
        currentChatId = newChat.id;
        loadChat(currentChatId);
        closeSidebar();
    }
    
    function loadChat(chatId) {
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        
        currentChatId = chatId;
        messagesContainer.innerHTML = '';
        
        if (chat.messages.length === 0) {
            const welcomeMsg = {
                role: 'assistant',
                content: 'Selamat datang di **RyedzAI-Agent**! 👋\n\nSaya adalah AI tutor profesional. Fitur baru:\n📄 **Upload materi** - AI bisa baca file Anda\n🎤 **Voice input** - Bicara langsung\n🔊 **Text-to-speech** - AI bacakan jawaban\n📝 **Quiz** - Uji pemahaman\n📎 **Copy & Export** - Simpan percakapan\n🔄 **Regenerate** - Minta jawaban ulang\n🔍 **Search** - Cari chat lama\n⏰ **Reminder** - Pengingat belajar',
                timestamp: Date.now()
            };
            chat.messages.push(welcomeMsg);
            saveChats();
        }
        
        chat.messages.forEach(msg => {
            renderMessage(msg.role, msg.content, msg.timestamp);
        });
        
        scrollToBottom();
        renderChatList();
    }
    
    function renderMessage(role, content, timestamp) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'assistant' ? 'ai' : 'user'}`;
        
        const formattedContent = content
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
        
        messageDiv.innerHTML = `
            <div class="bubble">${formattedContent}</div>
            <div class="message-actions">
                <button class="copy-msg" data-content="${escapeHtml(content)}"><i class="fas fa-copy"></i> Salin</button>
                ${role === 'assistant' ? '<button class="regenerate-msg"><i class="fas fa-undo-alt"></i> Regenerate</button>' : ''}
            </div>
            <div class="message-time">${formatTime()}</div>
        `;
        
        messagesContainer.appendChild(messageDiv);
        
        // Copy message handler
        messageDiv.querySelector('.copy-msg')?.addEventListener('click', () => copyToClipboard(content));
        
        // Regenerate handler
        if (role === 'assistant') {
            messageDiv.querySelector('.regenerate-msg')?.addEventListener('click', () => regenerateResponse());
        }
    }
    
    function addMessage(role, content) {
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        
        const newMessage = {
            role: role,
            content: content,
            timestamp: Date.now()
        };
        
        chat.messages.push(newMessage);
        chat.updatedAt = Date.now();
        
        if (role === 'user' && chat.messages.filter(m => m.role === 'user').length === 1) {
            chat.title = content.length > 25 ? content.substring(0, 25) + '...' : content;
        }
        
        saveChats();
        renderMessage(role, content, newMessage.timestamp);
        scrollToBottom();
        
        if (role === 'assistant' && isSpeakerEnabled) {
            speakText(content);
        }
    }
    
    function deleteChat(chatId, event) {
        event.stopPropagation();
        if (confirm('Hapus percakapan ini?')) {
            const index = chats.findIndex(c => c.id === chatId);
            if (index !== -1) {
                chats.splice(index, 1);
                saveChats();
                
                if (currentChatId === chatId) {
                    if (chats.length > 0) {
                        currentChatId = chats[0].id;
                        loadChat(currentChatId);
                    } else {
                        createNewChat();
                    }
                }
            }
        }
    }
    
    function renderChatList() {
        let filteredChats = chats;
        if (searchQuery) {
            filteredChats = chats.filter(chat => 
                chat.title.toLowerCase().includes(searchQuery) ||
                chat.messages.some(m => m.content.toLowerCase().includes(searchQuery))
            );
        }
        
        if (filteredChats.length === 0) {
            chatList.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Tidak ditemukan</p></div>';
            return;
        }
        
        chatList.innerHTML = filteredChats.map(chat => `
            <div class="chat-item ${currentChatId === chat.id ? 'active' : ''}" data-id="${chat.id}">
                <div class="chat-item-icon"><i class="fas fa-comment"></i></div>
                <div class="chat-item-info">
                    <div class="chat-item-title">${escapeHtml(chat.title)}</div>
                    <div class="chat-item-preview">${escapeHtml(chat.messages[chat.messages.length - 1]?.content.substring(0, 40) || 'Percakapan baru')}</div>
                </div>
                <div class="chat-item-date">${formatDate(chat.updatedAt)}</div>
                <button class="delete-chat" data-id="${chat.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
        `).join('');
        
        document.querySelectorAll('.chat-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (!e.target.closest('.delete-chat')) {
                    currentChatId = item.dataset.id;
                    loadChat(currentChatId);
                    closeSidebar();
                }
            });
            
            const deleteBtn = item.querySelector('.delete-chat');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', (e) => deleteChat(item.dataset.id, e));
            }
        });
    }
    
    // Groq API Call
    async function callGroqAPI(userMessage) {
        let context = '';
        if (uploadedFileContent) {
            context = `\n\n[Dengan file materi berikut: ${uploadedFileContent.substring(0, 2000)}]\n\n`;
        }
        
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${GROQ_API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: [
                    {
                        role: 'system',
                        content: 'Kamu adalah RyedzAI-Agent, AI tutor pendidikan yang profesional, sabar, dan membantu. Gunakan bahasa Indonesia yang baik. Berikan penjelasan mendetail. Gunakan **bold** untuk penekanan.' + context
                    },
                    { role: 'user', content: userMessage }
                ],
                temperature: 0.7,
                max_tokens: 2048
            })
        });
        
        const data = await response.json();
        if (!response.ok) throw new Error(data.error?.message);
        return data.choices[0].message.content;
    }
    
    async function sendToAI(userMessage, isRegenerate = false) {
        if (isSending) return;
        isSending = true;
        
        if (!isRegenerate) {
            addMessage('user', userMessage);
            lastUserMessage = userMessage;
        }
        messageInput.value = '';
        
        setAIStatus('Online', true);
        
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        messagesContainer.appendChild(typingDiv);
        scrollToBottom();
        
        try {
            const aiResponse = await callGroqAPI(userMessage);
            lastAiResponse = aiResponse;
            
            document.getElementById('typingIndicator')?.remove();
            addMessage('assistant', aiResponse);
            setAIStatus('Online', false);
            
        } catch (error) {
            document.getElementById('typingIndicator')?.remove();
            addMessage('assistant', `Maaf, terjadi kesalahan: ${error.message}`);
            setAIStatus('Online', false);
        } finally {
            isSending = false;
        }
    }
    
    function updateAdminStats() {
        document.getElementById('totalChats').innerText = chats.length;
        const totalMessages = chats.reduce((sum, chat) => sum + chat.messages.length, 0);
        document.getElementById('totalMessages').innerText = totalMessages;
        
        document.getElementById('apiStatusList').innerHTML = `
            <div style="padding: 12px; background: var(--bg-elevated); border-radius: 16px;">
                <div><i class="fas fa-bolt" style="color:#10B981"></i> Groq API (Llama 3.3)</div>
                <div style="font-size: 12px; margin-top: 4px;">✅ Aktif - ${chats.length} chats • ${totalMessages} pesan</div>
            </div>
        `;
    }
    
    function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('active'); }
    function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active'); }
    function openAdminPanel() { adminPanel.classList.add('open'); updateAdminStats(); }
    function closeAdminPanel() { adminPanel.classList.remove('open'); }
    
    menuBtn.addEventListener('click', openSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);
    newChatBtn.addEventListener('click', createNewChat);
    sendBtn.addEventListener('click', () => { const msg = messageInput.value.trim(); if (msg && !isSending) sendToAI(msg); });
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const msg = messageInput.value.trim(); if (msg && !isSending) sendToAI(msg); } });
    themeToggle.addEventListener('click', () => { darkMode = !darkMode; applyTheme(); });
    adminToggle.addEventListener('click', openAdminPanel);
    closeAdminBtn.addEventListener('click', closeAdminPanel);
    
    applyTheme();
    loadChats();
    
    console.log('🚀 RyedzAI-Agent dengan 10 fitur baru siap digunakan!');
</script>
