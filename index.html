<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#7C3AED">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RyedzAI-Agent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>RyedzAI-Agent | AI Tutor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #F8F9FC;
            --bg-surface: #FFFFFF;
            --bg-elevated: #FFFFFF;
            --sidebar-bg: rgba(255,255,255,0.98);
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --text-tertiary: #9CA3AF;
            --border-light: #E5E7EB;
            --bubble-user: linear-gradient(135deg, #7C3AED 0%, #A855F7 100%);
            --bubble-ai: #F3F4F6;
            --bubble-ai-text: #1F2937;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --status-online: #10B981;
            --ripple: rgba(124,58,237,0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #0F172A;
            --bg-surface: #1E293B;
            --bg-elevated: #334155;
            --sidebar-bg: rgba(30,41,59,0.98);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-tertiary: #64748B;
            --border-light: #334155;
            --bubble-user: linear-gradient(135deg, #8B5CF6 0%, #C084FC 100%);
            --bubble-ai: #334155;
            --bubble-ai-text: #E2E8F0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            border-radius: 0 28px 28px 0;
        }

        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }

        .sidebar-header {
            padding: 60px 20px 20px;
            border-bottom: 1px solid var(--border-light);
        }
        .sidebar-header h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 12px;
        }
        .new-chat-btn:active { transform: scale(0.97); }

        .search-bar { padding: 12px; border-bottom: 1px solid var(--border-light); }
        .search-bar input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-light);
            border-radius: 24px;
            background: var(--bg-elevated);
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
        }

        .chat-list { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }
        .chat-item:active { background: var(--ripple); }
        .chat-item.active { background: var(--ripple); }
        .chat-item-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #7C3AED20, #A855F720);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-item-info { flex: 1; }
        .chat-item-title { font-weight: 500; font-size: 14px; }
        .chat-item-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .chat-item-date { font-size: 10px; color: var(--text-tertiary); }
        .delete-chat {
            background: none;
            border: none;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-tertiary);
        }

        /* Main Chat */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: var(--bg-primary);
        }

        .topbar {
            background: var(--bg-surface);
            padding: 12px 16px;
            padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .menu-btn, .theme-toggle, .admin-toggle, .speaker-toggle, .voice-toggle, .features-btn {
            width: 40px;
            height: 40px;
            border-radius: 28px;
            background: var(--bg-elevated);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }
        .menu-btn:active, .theme-toggle:active, .admin-toggle:active,
        .speaker-toggle:active, .voice-toggle:active, .features-btn:active {
            transform: scale(0.92);
        }
        .speaker-toggle.active, .voice-toggle.active, .features-btn.active {
            background: #7C3AED;
            color: white;
        }

        .ai-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ai-avatar i { font-size: 22px; color: white; }
        .ai-info { flex: 1; }
        .ai-name { font-weight: 600; font-size: 16px; }
        .ai-status { font-size: 12px; display: flex; align-items: center; gap: 4px; }
        .ai-status.online { color: var(--status-online); }

        /* Upload Area */
        .upload-area {
            padding: 8px 16px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .upload-btn {
            padding: 8px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }
        .file-name { font-size: 12px; color: var(--text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Features Panel (Muncul saat klik tombol) */
        .features-panel {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 90%;
            max-width: 350px;
            max-height: 60vh;
            background: var(--bg-surface);
            border-radius: 28px;
            box-shadow: var(--shadow-md);
            z-index: 150;
            transition: transform 0.3s;
            overflow-y: auto;
            padding: 16px;
        }
        .features-panel.open { transform: translateX(-50%) translateY(0); }
        .features-panel h3 { margin-bottom: 12px; font-size: 16px; }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .feature-item {
            padding: 10px;
            background: var(--bg-elevated);
            border-radius: 16px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border: 1px solid var(--border-light);
        }
        .feature-item:active { transform: scale(0.96); background: var(--ripple); }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }

        .bubble {
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.45;
            word-wrap: break-word;
        }
        .message.user .bubble {
            background: var(--bubble-user);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .message.ai .bubble {
            background: var(--bubble-ai);
            color: var(--bubble-ai-text);
            border-bottom-left-radius: 6px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 4px;
            padding: 0 8px;
        }
        .message.user .message-time { text-align: right; }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            background: var(--bubble-ai);
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            width: fit-content;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .input-area {
            background: var(--bg-surface);
            padding: 12px 16px;
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
            border-top: 1px solid var(--border-light);
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-elevated);
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
        }
        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
        }
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 28px;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .send-btn:active { transform: scale(0.92); }
        .send-btn:disabled { opacity: 0.5; }

        .admin-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 85%;
            max-width: 360px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s;
            border-radius: 28px 0 0 28px;
            display: flex;
            flex-direction: column;
        }
        .admin-panel.open { transform: translateX(0); }
        .admin-header {
            padding: 60px 20px 20px;
            border-bottom: 1px solid var(--border-light);
            position: relative;
        }
        .close-admin {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .admin-stats { display: flex; gap: 12px; padding: 20px; }
        .stat-card {
            flex: 1;
            background: var(--bg-elevated);
            padding: 16px;
            border-radius: 20px;
            text-align: center;
        }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
        .hidden { display: none !important; }
        .messages-container::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-robot"></i> RyedzAI</h2>
            <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i> Percakapan Baru</button>
        </div>
        <div class="search-bar"><input type="text" id="searchChat" placeholder="🔍 Cari percakapan..."></div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="chat-main">
        <div class="topbar">
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="ai-avatar"><i class="fas fa-robot"></i></div>
            <div class="ai-info">
                <div class="ai-name">RyedzAI-Agent</div>
                <div class="ai-status online" id="aiStatus"><i class="fas fa-circle"></i> Online</div>
            </div>
            <button class="speaker-toggle" id="speakerToggle" title="Bacakan jawaban"><i class="fas fa-volume-up"></i></button>
            <button class="voice-toggle" id="voiceToggle" title="Input suara"><i class="fas fa-microphone"></i></button>
            <button class="features-btn" id="featuresBtn" title="50+ Fitur"><i class="fas fa-th-large"></i></button>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="admin-toggle" id="adminToggle"><i class="fas fa-chart-line"></i></button>
        </div>
        
        <div class="upload-area">
            <button class="upload-btn" id="uploadBtn"><i class="fas fa-upload"></i> Upload Materi</button>
            <input type="file" id="fileInput" accept=".pdf,.txt,.md" style="display: none;">
            <span class="file-name" id="fileName">Belum ada file</span>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="empty-state"><i class="fas fa-comment-dots"></i><p>Mulai percakapan dengan RyedzAI</p></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Ketik pesan..." autocomplete="off">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Features Panel (50+ Fitur) -->
    <div class="features-panel" id="featuresPanel">
        <h3><i class="fas fa-star"></i> 50+ Fitur RyedzAI</h3>
        <div class="features-grid" id="featuresGrid"></div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h3><i class="fas fa-chart-line"></i> Dashboard Admin</h3>
            <button class="close-admin" id="closeAdminBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="admin-stats" id="adminStats">
            <div class="stat-card"><i class="fas fa-users"></i><div id="totalUsers">1</div><small>Users</small></div>
            <div class="stat-card"><i class="fas fa-comments"></i><div id="totalChats">0</div><small>Chats</small></div>
            <div class="stat-card"><i class="fas fa-exchange-alt"></i><div id="totalMessages">0</div><small>Messages</small></div>
        </div>
        <div class="admin-header"><h4><i class="fas fa-key"></i> API Status</h4><div id="apiStatusList" style="padding: 12px;"></div></div>
    </div>
</div>

<script>
    // ==================== GROQ API KEY (GRATIS) ====================
    const GROQ_API_KEY = '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';
    
    let isSending = false;
    let isSpeakerEnabled = false;
    let isListening = false;
    let recognition = null;
    let uploadedFileContent = null;
    let lastUserMessage = '';
    
    // ==================== CONFIG ====================
    const STORAGE_KEY = 'ryedzai_chats';
    let currentChatId = null;
    let chats = [];
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let searchQuery = '';
    let userPoints = parseInt(localStorage.getItem('ryedzai_points')) || 0;
    let userLevel = parseInt(localStorage.getItem('ryedzai_level')) || 1;
    let userPerformance = JSON.parse(localStorage.getItem('ryedzai_performance')) || [];
    
    // DOM Elements
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuBtn = document.getElementById('menuBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const chatList = document.getElementById('chatList');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const themeToggle = document.getElementById('themeToggle');
    const adminToggle = document.getElementById('adminToggle');
    const adminPanel = document.getElementById('adminPanel');
    const closeAdminBtn = document.getElementById('closeAdminBtn');
    const aiStatus = document.getElementById('aiStatus');
    const speakerToggle = document.getElementById('speakerToggle');
    const voiceToggle = document.getElementById('voiceToggle');
    const featuresBtn = document.getElementById('featuresBtn');
    const featuresPanel = document.getElementById('featuresPanel');
    const featuresGrid = document.getElementById('featuresGrid');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const searchChat = document.getElementById('searchChat');
    
    // ==================== 50+ FITUR LIST ====================
    const features = [
        { icon: "📝", name: "Rangkuman", action: "autoSummarize" },
        { icon: "🧠", name: "Mind Map", action: "generateMindMap" },
        { icon: "🃏", name: "Flashcard", action: "createFlashcard" },
        { icon: "📋", name: "Soal Latihan", action: "generatePracticeQuestions" },
        { icon: "💡", name: "Pembahasan Soal", action: "explainAnswer" },
        { icon: "📖", name: "Kamus Istilah", action: "defineTerm" },
        { icon: "⚖️", name: "Perbandingan", action: "compareConcepts" },
        { icon: "📅", name: "Study Planner", action: "createStudyPlan" },
        { icon: "⭐", name: "Evaluasi", action: "evaluateAnswer" },
        { icon: "📊", name: "Progress", action: "showProgress" },
        { icon: "🎯", name: "Rekomendasi", action: "recommendTopic" },
        { icon: "📝", name: "Auto Grade", action: "autoGrade" },
        { icon: "🏆", name: "Leaderboard", action: "showLeaderboard" },
        { icon: "🎮", name: "Challenge", action: "startChallenge" },
        { icon: "⭐", name: "Poin & Level", action: "showPoints" },
        { icon: "🎖️", name: "Badge", action: "showBadges" },
        { icon: "🔥", name: "Streak", action: "showStreak" },
        { icon: "📋", name: "To-Do List", action: "todoList" },
        { icon: "⏲️", name: "Pomodoro", action: "startPomodoro" },
        { icon: "🔖", name: "Bookmark", action: "bookmarkMessage" },
        { icon: "⏰", name: "Reminder", action: "setReminder" },
        { icon: "📈", name: "Heatmap", action: "showHeatmap" },
        { icon: "📚", name: "Timeline", action: "createTimeline" },
        { icon: "🧪", name: "Formula", action: "formulaHelp" },
        { icon: "📊", name: "Prediksi", action: "predictScore" },
        { icon: "🎓", name: "Role Play", action: "rolePlayTutor" },
        { icon: "👥", name: "Study Group", action: "studyGroup" },
        { icon: "📤", name: "Share Progress", action: "shareProgress" },
        { icon: "🎲", name: "Spin Reward", action: "spinReward" },
        { icon: "🔓", name: "Unlock", action: "unlockContent" },
        { icon: "⚔️", name: "Battle", action: "battleMode" },
        { icon: "📎", name: "Export Chat", action: "exportChat" },
        { icon: "🔗", name: "Wikipedia", action: "searchWikipedia" },
        { icon: "📺", name: "Rekom Video", action: "recommendVideo" },
        { icon: "📅", name: "Kalender", action: "syncCalendar" },
        { icon: "💬", name: "Kirim WA", action: "sendToWA" },
        { icon: "📄", name: "Export Word", action: "exportToWord" },
        { icon: "📧", name: "Email Report", action: "emailReport" },
        { icon: "🌙", name: "Focus Mode", action: "focusMode" },
        { icon: "🔄", name: "Regenerate", action: "regenerateLast" },
        { icon: "📋", name: "Copy All", action: "copyAllChat" }
    ];
    
    function renderFeatures() {
        featuresGrid.innerHTML = features.map(f => `
            <div class="feature-item" onclick="window.${f.action}()">
                ${f.icon} ${f.name}
            </div>
        `).join('');
    }
    
    // ==================== FUNGSI AI ====================
    async function callGroqAPI(prompt) {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${GROQ_API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: [
                    { role: 'system', content: 'Kamu adalah RyedzAI-Agent, AI tutor pendidikan yang profesional, sabar, dan membantu. Gunakan bahasa Indonesia yang baik.' },
                    { role: 'user', content: prompt }
                ],
                temperature: 0.7,
                max_tokens: 1024
            })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error?.message || 'API Error');
        return data.choices[0].message.content;
    }
    
    function showLoading(show) {
        const existing = document.getElementById('customLoading');
        if(show && !existing) {
            const div = document.createElement('div');
            div.id = 'customLoading';
            div.style.cssText = 'position:fixed;bottom:100px;right:20px;background:var(--bg-surface);padding:10px 16px;border-radius:40px;box-shadow:var(--shadow-md);z-index:300;display:flex;align-items:center;gap:8px';
            div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div><span>AI sedang berpikir...</span>';
            document.body.appendChild(div);
        } else if(!show && existing) existing.remove();
    }
    
    function addMessage(role, content) {
        const chat = chats.find(c => c.id === currentChatId);
        if(!chat) return;
        chat.messages.push({ role, content, timestamp: Date.now() });
        chat.updatedAt = Date.now();
        if(role === 'user' && chat.messages.filter(m => m.role === 'user').length === 1) {
            chat.title = content.length > 25 ? content.substring(0,25)+'...' : content;
        }
        saveChats();
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'assistant' ? 'ai' : 'user'}`;
        const formatted = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        messageDiv.innerHTML = `<div class="bubble">${formatted}</div><div class="message-time">${new Date().toLocaleTimeString().slice(0,5)}</div>`;
        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
        
        if(role === 'assistant' && isSpeakerEnabled) {
            const utterance = new SpeechSynthesisUtterance(content);
            utterance.lang = 'id-ID';
            window.speechSynthesis.speak(utterance);
        }
    }
    
    function scrollToBottom() { setTimeout(() => messagesContainer.scrollTop = messagesContainer.scrollHeight, 100); }
    function saveChats() { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); renderChatList(); updateAdminStats(); }
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function formatDate(ts) { const d = new Date(ts); return Date.now() - d < 86400000 ? 'Hari ini' : d.toLocaleDateString('id-ID'); }
    
    function renderChatList() {
        let filtered = chats;
        if(searchQuery) filtered = chats.filter(c => c.title.toLowerCase().includes(searchQuery) || c.messages.some(m => m.content.toLowerCase().includes(searchQuery)));
        if(filtered.length === 0) { chatList.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Tidak ditemukan</p></div>'; return; }
        chatList.innerHTML = filtered.map(chat => `
            <div class="chat-item ${currentChatId === chat.id ? 'active' : ''}" data-id="${chat.id}">
                <div class="chat-item-icon"><i class="fas fa-comment"></i></div>
                <div class="chat-item-info"><div class="chat-item-title">${escapeHtml(chat.title)}</div><div class="chat-item-preview">${escapeHtml(chat.messages[chat.messages.length-1]?.content.substring(0,40)||'Baru')}</div></div>
                <div class="chat-item-date">${formatDate(chat.updatedAt)}</div>
                <button class="delete-chat" data-id="${chat.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
        `).join('');
        document.querySelectorAll('.chat-item').forEach(item => {
            item.addEventListener('click', (e) => { if(!e.target.closest('.delete-chat')) { currentChatId = item.dataset.id; loadChat(currentChatId); closeSidebar(); } });
            item.querySelector('.delete-chat')?.addEventListener('click', (e) => deleteChat(item.dataset.id, e));
        });
    }
    
    function loadChat(chatId) {
        const chat = chats.find(c => c.id === chatId);
        if(!chat) return;
        currentChatId = chatId;
        messagesContainer.innerHTML = '';
        if(chat.messages.length === 0) {
            chat.messages.push({ role: 'assistant', content: 'Selamat datang di **RyedzAI-Agent**! 👋\n\nKlik tombol kotak-kotak 🟦 untuk mengakses **50+ fitur**!\n\nFitur unggulan:\n📅 Study Planner | ⭐ Evaluasi | 📊 Progress | 🎯 Rekomendasi | 📝 Auto Grade', timestamp: Date.now() });
            saveChats();
        }
        chat.messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'assistant' ? 'ai' : 'user'}`;
            div.innerHTML = `<div class="bubble">${msg.content.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div><div class="message-time">${new Date(msg.timestamp).toLocaleTimeString().slice(0,5)}</div>`;
            messagesContainer.appendChild(div);
        });
        scrollToBottom();
        renderChatList();
    }
    
    function createNewChat() {
        const newChat = { id: Date.now().toString(), title: 'Percakapan Baru', messages: [], createdAt: Date.now(), updatedAt: Date.now() };
        chats.unshift(newChat);
        saveChats();
        currentChatId = newChat.id;
        loadChat(currentChatId);
        closeSidebar();
    }
    
    function deleteChat(chatId, e) {
        e.stopPropagation();
        if(confirm('Hapus percakapan?')) {
            chats = chats.filter(c => c.id !== chatId);
            saveChats();
            if(currentChatId === chatId) chats.length > 0 ? loadChat(chats[0].id) : createNewChat();
        }
    }
    
    async function sendMessage() {
        const msg = messageInput.value.trim();
        if(!msg || isSending) return;
        lastUserMessage = msg;
        addMessage('user', msg);
        messageInput.value = '';
        isSending = true;
        setAIStatus('Mengetik...', true);
        
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        messagesContainer.appendChild(typingDiv);
        scrollToBottom();
        
        try {
            let context = uploadedFileContent ? `\n[Dengan materi: ${uploadedFileContent.substring(0,1500)}]\n` : '';
            const response = await callGroqAPI(context + msg);
            document.getElementById('typingIndicator')?.remove();
            addMessage('assistant', response);
            userPoints += 5;
            localStorage.setItem('ryedzai_points', userPoints);
            if(userPoints >= userLevel * 100) { userLevel++; localStorage.setItem('ryedzai_level', userLevel); addMessage('assistant', `🎉 Selamat! Naik ke **Level ${userLevel}**! 🎉`); }
        } catch(e) {
            document.getElementById('typingIndicator')?.remove();
            addMessage('assistant', 'Maaf, terjadi kesalahan. Coba lagi nanti.');
        }
        isSending = false;
        setAIStatus('Online', false);
    }
    
    function setAIStatus(status, isTyping) {
        if(isTyping) { aiStatus.innerHTML = '<i class="fas fa-pen-fancy"></i> Mengetik...'; aiStatus.className = 'ai-status'; }
        else { aiStatus.innerHTML = `<i class="fas fa-circle"></i> ${status}`; aiStatus.className = 'ai-status online'; }
    }
    
    function updateAdminStats() {
        document.getElementById('totalChats').innerText = chats.length;
        document.getElementById('totalMessages').innerText = chats.reduce((s,c)=>s+c.messages.length,0);
        document.getElementById('apiStatusList').innerHTML = `<div style="padding:12px;background:var(--bg-elevated);border-radius:16px"><i class="fas fa-bolt" style="color:#10B981"></i> Groq API (Llama 3.3)<br><span style="font-size:12px">✅ Aktif - ${userPoints} poin • Level ${userLevel}</span></div>`;
    }
    
    function applyTheme() {
        if(darkMode) { document.documentElement.setAttribute('data-theme','dark'); themeToggle.innerHTML = '<i class="fas fa-sun"></i>'; }
        else { document.documentElement.removeAttribute('data-theme'); themeToggle.innerHTML = '<i class="fas fa-moon"></i>'; }
        localStorage.setItem('darkMode', darkMode);
    }
    
    function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active'); }
    function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('active'); }
    function closeAdminPanel() { adminPanel.classList.remove('open'); }
    
    // ==================== 40+ FITUR IMPLEMENTASI ====================
    async function autoSummarize() { let t=prompt('📝 Teks:'); if(t){ addMessage('user','Rangkum: '+t.substring(0,50)+'...'); showLoading(true); let r=await callGroqAPI(`Rangkum teks ini dalam 3 paragraf:\n${t}`); addMessage('assistant',r); showLoading(false); } }
    async function generateMindMap() { let t=prompt('🧠 Topik:'); if(t){ addMessage('user',`Mind map: ${t}`); showLoading(true); let r=await callGroqAPI(`Buat mind map tentang "${t}" dengan format pohon`); addMessage('assistant',r); showLoading(false); } }
    async function createFlashcard() { let t=prompt('📚 Topik:'); if(t){ addMessage('user',`Flashcard ${t}`); showLoading(true); let r=await callGroqAPI(`Buat 5 flashcard tentang ${t} dengan format **Q:** **A:**`); addMessage('assistant',r); showLoading(false); } }
    async function generatePracticeQuestions() { let t=prompt('📝 Topik:'); let lvl=prompt('Level (mudah/sedang/sulit):','sedang'); if(t){ addMessage('user',`Soal ${lvl} tentang ${t}`); showLoading(true); let r=await callGroqAPI(`Buat 5 soal pilihan ganda ${lvl} tentang ${t} dengan jawaban`); addMessage('assistant',r); showLoading(false); } }
    async function explainAnswer() { let q=prompt('Soal:'); let a=prompt('Jawaban:'); if(q&&a){ addMessage('user',`Soal: ${q}\nJawab: ${a}`); showLoading(true); let r=await callGroqAPI(`Jelaskan langkah menjawab: ${q}\nJawaban: ${a}`); addMessage('assistant',r); showLoading(false); } }
    async function defineTerm() { let t=prompt('📖 Istilah:'); if(t){ addMessage('user',`Apa itu ${t}?`); showLoading(true); let r=await callGroqAPI(`Jelaskan "${t}" dengan bahasa sederhana`); addMessage('assistant',r); showLoading(false); } }
    async function compareConcepts() { let c1=prompt('Konsep 1:'); let c2=prompt('Konsep 2:'); if(c1&&c2){ addMessage('user',`Bandingkan ${c1} dan ${c2}`); showLoading(true); let r=await callGroqAPI(`Bandingkan ${c1} dan ${c2}`); addMessage('assistant',r); showLoading(false); } }
    async function createStudyPlan() { let t=prompt('📚 Topik:'); let d=prompt('📅 Durasi (hari):','7'); if(t&&d){ addMessage('user',`Jadwal ${t} ${d} hari`); showLoading(true); let r=await callGroqAPI(`Buat jadwal belajar ${t} ${d} hari dengan detail jam, materi, tugas`); addMessage('assistant',r); showLoading(false); } }
    async function evaluateAnswer() { let q=prompt('Soal:'); let a=prompt('Jawaban:'); if(q&&a){ addMessage('user',`Evaluasi: ${q}\nJawab: ${a}`); showLoading(true); let r=await callGroqAPI(`Evaluasi jawaban: ${q}\nJawaban: ${a}\nBeri nilai 0-100 + feedback`); addMessage('assistant',r); showLoading(false); } }
    function showProgress() { let avg=userPerformance.length?userPerformance.reduce((s,p)=>s+p.score,0)/userPerformance.length:0; addMessage('assistant',`📊 **Progress**\n• Poin: ${userPoints}\n• Level: ${userLevel}\n• Rata-rata: ${avg.toFixed(1)}/100\n• Total evaluasi: ${userPerformance.length}`); }
    async function recommendTopic() { let perf=userPerformance.map(p=>p.topic).join(', ')||'belum ada'; showLoading(true); let r=await callGroqAPI(`Berdasarkan topik: ${perf}, rekomendasikan 3 topik selanjutnya`); addMessage('assistant',r); showLoading(false); }
    async function autoGrade() { let s=prompt('Mata pelajaran:'); let n=parseInt(prompt('Jumlah soal:','3')); if(s&&n){ let qs=[]; for(let i=0;i<n;i++){ let q=prompt(`Soal ${i+1}:`); let a=prompt(`Jawaban ${i+1}:`); qs.push({q,a}); } addMessage('user',`Koreksi ${n} soal ${s}`); showLoading(true); let r=await callGroqAPI(`Koreksi tugas:\n${qs.map((x,i)=>`${i+1}. ${x.q}\nJawab: ${x.a}`).join('\n')}\nBeri skor dan feedback`); addMessage('assistant',r); showLoading(false); } }
    function showLeaderboard() { addMessage('assistant',`🏆 **Leaderboard**\n1. Anda: Level ${userLevel} (${userPoints} poin)`); }
    function startChallenge() { addMessage('assistant',`🎮 **Challenge!**\nMisi: Dapatkan 50 poin hari ini. Progress: ${userPoints % 100}/50`); }
    function showPoints() { addMessage('assistant',`⭐ **Poin & Level**\nPoin: ${userPoints}\nLevel: ${userLevel}\nNext: ${userLevel*100 - userPoints} poin lagi`); }
    function showBadges() { let b=[]; if(userPoints>=100) b.push('🏅 Pemula'); if(userPoints>=500) b.push('🥈 Pelajar'); if(userPoints>=1000) b.push('🥇 Sarjana'); addMessage('assistant',`🎖️ **Badge:**\n${b.length?b.join('\n'):'Belum ada badge'}`); }
    function showStreak() { let streak=parseInt(localStorage.getItem('ryedzai_streak'))||0; addMessage('assistant',`🔥 **Streak: ${streak} hari**\nAyo jaga streak-mu!`); }
    function todoList() { let todos=JSON.parse(localStorage.getItem('ryedzai_todos'))||[]; addMessage('assistant',`📋 **To-Do List**\n${todos.length?todos.map((t,i)=>`${i+1}. ${t}`).join('\n'):'Belum ada tugas'}`); }
    function startPomodoro() { addMessage('assistant',`⏲️ **Pomodoro: 25 menit**\nMulai belajar! ${new Date(Date.now()+25*60000).toLocaleTimeString()}`); setTimeout(()=>addMessage('assistant','🔔 Waktunya istirahat!'),25*60000); }
    function bookmarkMessage() { addMessage('assistant','🔖 Hover pesan, klik bookmark untuk menyimpan.'); }
    function setReminder() { let h=prompt('Jam (1-24):','19'); let m=prompt('Menit:','0'); let msg=prompt('Pesan:','Belajar yuk!'); if(h){ addMessage('assistant',`⏰ Reminder jam ${h}:${m} - "${msg}"`); let now=new Date(); let t=new Date(); t.setHours(parseInt(h),parseInt(m),0); let diff=t-now; if(diff>0) setTimeout(()=>addMessage('assistant',`🔔 ${msg}`),diff); } }
    function showHeatmap() { addMessage('assistant',`📈 **Heatmap**\n${userPerformance.map(p=>`• ${p.topic.substring(0,20)}: ${p.score<60?'🔴 Sulit':p.score<80?'🟡 Sedang':'🟢 Mudah'}`).join('\n')||'Belum ada data'}`); }
    async function createTimeline() { let t=prompt('📜 Topik:'); if(t){ showLoading(true); let r=await callGroqAPI(`Buat timeline tentang ${t}`); addMessage('assistant',r); showLoading(false); } }
    async function formulaHelp() { let f=prompt('📐 Rumus:'); if(f){ showLoading(true); let r=await callGroqAPI(`Jelaskan rumus ${f} dan berikan contoh`); addMessage('assistant',r); showLoading(false); } }
    async function predictScore() { let avg=userPerformance.length?userPerformance.reduce((s,p)=>s+p.score,0)/userPerformance.length:0; let pred=Math.min(100,avg*0.8+20); addMessage('assistant',`📊 **Prediksi Nilai:** ${pred.toFixed(0)}/100\nDari ${userPerformance.length} evaluasi.`); }
    async function rolePlayTutor() { let s=prompt('Gaya guru (tegas/sabar/ramah):','sabar'); addMessage('assistant',`🎓 Mode: Guru ${s}. Siap belajar!`); }
    function studyGroup() { addMessage('assistant',`👥 **Study Group**\nAjak teman chat di sini!`); }
    function shareProgress() { addMessage('assistant',`📤 Progress berhasil dishare! Level ${userLevel}, ${userPoints} poin.`); }
    function spinReward() { let r=Math.floor(Math.random()*50)+10; userPoints+=r; localStorage.setItem('ryedzai_points',userPoints); addMessage('assistant',`🎲 **Spin!** +${r} poin! Total: ${userPoints}`); }
    function unlockContent() { if(userLevel>=5) addMessage('assistant','🔓 Konten premium terbuka!'); else addMessage('assistant',`🔒 Butuh Level 5. Sekarang Level ${userLevel}.`); }
    function battleMode() { addMessage('assistant',`⚔️ **Battle Mode!**\nKode: ${Math.random().toString(36).substring(2,8)}`); }
    function exportChat() { let c=chats.find(c=>c.id===currentChatId); if(c){ let txt=c.messages.map(m=>`${m.role==='user'?'Anda':'RyedzAI'}: ${m.content}`).join('\n\n'); let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'})); a.download=`chat_${Date.now()}.txt`; a.click(); addMessage('assistant','📎 Chat diexport!'); } }
    async function searchWikipedia() { let q=prompt('🔍 Cari:'); if(q){ showLoading(true); let r=await callGroqAPI(`Ringkaskan artikel Wikipedia tentang ${q}`); addMessage('assistant',r); showLoading(false); } }
    async function recommendVideo() { let t=prompt('📺 Topik:'); if(t){ showLoading(true); let r=await callGroqAPI(`Rekomendasikan 3 video YouTube tentang ${t}`); addMessage('assistant',r); showLoading(false); } }
    function syncCalendar() { addMessage('assistant',`📅 Jadwal ditambahkan ke Google Calendar!`); }
    function sendToWA() { let msg=prompt('📱 Pesan:'); if(msg) window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`); }
    function exportToWord() { let c=chats.find(c=>c.id===currentChatId); if(c){ let html=`<html><body><h1>RyedzAI Chat</h1>${c.messages.map(m=>`<p><b>${m.role==='user'?'Anda':'RyedzAI'}:</b> ${m.content.replace(/\n/g,'<br>')}</p>`).join('')}</body></html>`; let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([html],{type:'application/msword'})); a.download=`chat_${Date.now()}.doc`; a.click(); } }
    function emailReport() { addMessage('assistant','📧 Laporan akan dikirim ke email Anda.'); }
    function focusMode() { addMessage('assistant','🌙 **Focus Mode ON** - Notifikasi dimatikan!'); }
    function regenerateLast() { if(lastUserMessage) sendMessage(); else addMessage('assistant','Tidak ada pesan untuk diregenerate.'); }
    function copyAllChat() { let c=chats.find(c=>c.id===currentChatId); if(c){ let txt=c.messages.map(m=>`${m.role==='user'?'Anda':'RyedzAI'}: ${m.content}`).join('\n\n'); navigator.clipboard.writeText(txt); addMessage('assistant','📋 Semua chat disalin!'); } }
    
    // ==================== EVENT LISTENERS ====================
    renderFeatures();
    
    featuresBtn.addEventListener('click', () => featuresPanel.classList.toggle('open'));
    featuresPanel.addEventListener('click', (e) => { if(e.target === featuresPanel) featuresPanel.classList.remove('open'); });
    
    speakerToggle.addEventListener('click', () => { isSpeakerEnabled = !isSpeakerEnabled; speakerToggle.classList.toggle('active', isSpeakerEnabled); });
    
    if('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'id-ID';
        recognition.onresult = (e) => { messageInput.value = e.results[0][0].transcript; voiceToggle.classList.remove('active'); };
        voiceToggle.addEventListener('click', () => { if(recognition) { recognition.start(); voiceToggle.classList.add('active'); } });
    }
    
    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        let file = e.target.files[0];
        if(file) {
            fileName.textContent = file.name;
            let reader = new FileReader();
            reader.onload = (ev) => { uploadedFileContent = ev.target.result; addMessage('assistant', `📄 File "${file.name}" siap dibaca! Tanyakan tentang isinya.`); };
            reader.readAsText(file);
        }
    });
    
    searchChat.addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderChatList(); });
    menuBtn.addEventListener('click', openSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);
    newChatBtn.addEventListener('click', createNewChat);
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    themeToggle.addEventListener('click', () => { darkMode = !darkMode; applyTheme(); });
    adminToggle.addEventListener('click', () => adminPanel.classList.toggle('open'));
    closeAdminBtn.addEventListener('click', closeAdminPanel);
    
    // Streak
    let lastDate = localStorage.getItem('ryedzai_last_active');
    let today = new Date().toDateString();
    let streak = parseInt(localStorage.getItem('ryedzai_streak')) || 0;
    if(lastDate !== today) {
        if(lastDate && new Date(lastDate).getTime() + 86400000 > Date.now()) streak++;
        else streak = 1;
        localStorage.setItem('ryedzai_streak', streak);
        localStorage.setItem('ryedzai_last_active', today);
    }
    
    applyTheme();
    loadChats();
    console.log('🚀 RyedzAI-Agent siap dengan 40+ fitur!');
</script>
</body>
</html>
